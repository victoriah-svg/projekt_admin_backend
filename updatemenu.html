<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cats & Coffee admin</title>
  <link rel="stylesheet" href="/src/CSS/main.scss">
  <!--fontawesome ikoner-kit-->
  <script src="https://kit.fontawesome.com/b5ebcdff90.js" crossorigin="anonymous"></script>
</head>

<body>
  <header id="headerNav" class="topnav">
    <a href="/" id="logoLink"><img src="/Images/logo_projekt.svg" alt="Cats and coffee" id="logo">
      <span>Admin</span></a>
    <!--hamburgerikon-->
    <div id="hamburger">
      <img src="/Images/menuebar_black.svg" alt="meny">
    </div>
    <nav>
      <ul id="menu" class="nav-links">
        <li><a href="/">Start</a></li>
        <li><a href="/deletemenu">Delete | Update menu</a></li>
        <li><a href="/addmenu">Add menu</a></li>
        <li><a href="/messages">Messages</a></li>
        <li><a href="/bookings">Bookings</a></li>
        <li id="loginLink"><a href="/login">Login</a></li>
      </ul>
    </nav>
  </header>

  <main id="mainUpdateMenu">
    <div id="updateMenudiv">
      <h1>Update chosen item from menu</h1>
      <h2>Chosen item: </h2>
      <p id="chosenItem"></p>
      <div id="errorDivUpdate"></div>
      <form id="updateForm">
        <label for="nameUpdate">Name: </label>
        <input type="text" id="nameUpdate">
        <!--Div där selectoptions kommer läggas till beroende på vad som ska uppdateras-->
        <div id="selectionDivUpdate"></div>
        <label for="priceUpdate">Price: </label>
        <input type="text" id="priceUpdate">
        <label for="descriptionUpdate">Description (optional)</label>
        <input type="text" id="descriptionUpdate">
        <input type="submit" value="Update item" id="submitUpdate">
      </form>
      <div id="updatedItemSection"></div>
    </div>
  </main>
  <footer>
    <section>
      <p><strong>&copy; Cats & Coffee Admin</strong></p>
      <a href="https://catsandcoffeeguest.netlify.app" target="_blank">Go to visitor webpage (opens in new tab)</a>
      <div id="registerLink"></div>
    </section>
    <div>
      <p>Our accounts: </p>
      <a href="#" aria-label="Facebook">
        <i class="fa-brands fa-facebook fa-2xl" aria-hidden="true"></i>
      </a>
      <a href="#" aria-label="instagram">
        <i class="fa-brands fa-instagram fa-2xl" aria-hidden="true"></i>
      </a>
    </div>
  </footer>
  <script type="module" src="/src/js/main.js"></script>
  <script type="module" src="/src/js/hamburger.js"></script>
  <script type="module" src="/src/js/checkAuth.js"></script>
  <script type="module" src="/src/js/updatemenu.js"></script>

</body>

</html>
