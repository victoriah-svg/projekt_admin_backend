<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cats & Coffee admin</title>
  <link rel="stylesheet" href="/src/CSS/main.scss">
  <!--fontawesome ikoner-kit-->
  <script src="https://kit.fontawesome.com/b5ebcdff90.js" crossorigin="anonymous"></script>
</head>

<body>
  <header id="headerNav" class="topnav">
    <a href="/" id="logoLink"><img src="/Images/logo_projekt.svg" alt="Cats and coffee" id="logo">
      <span>Admin</span></a>
    <!--hamburgerikon-->
    <div id="hamburger">
      <img src="/Images/menuebar_black.svg" alt="meny">
    </div>
    <nav>
      <ul id="menu" class="nav-links">
        <li><a href="/">Start</a></li>
        <li><a href="/deletemenu">Delete | Update menu</a></li>
        <li class="active"><a href="/addmenu">Add menu</a></li>
        <li><a href="/messages">Messages</a></li>
        <li><a href="/bookings">Bookings</a></li>
        <li id="loginLink"><a href="/login">Login</a></li>
      </ul>
    </nav>
  </header>

  <main id="mainAdd">
    <div id="addDiv">
      <h1>Add item to menu</h1>
      <div id="errorDivAdd"></div>
      <form id="addMenuForm">
        <label for="selectTableAdd">To which menue would you like to add an item?</label>
        <select name="selectTableAdd" id="selectTableAdd">
          <option value="food">food</option>
          <option value="drink">drink</option>
        </select>
        <label for="nameInputAdd">Name: </label>
        <input type="text" id="nameInputAdd">

        <!--Div där selectoptions kommer läggas till beroende på vilken table som valts-->
        <div id="selectionDivUpdate"></div>
        <label for="priceInputAdd">Price: </label>
        <input type="text" id="priceInputAdd">
        <label for="descriptionInputAdd">Description: </label>
        <input type="text" id="descriptionInputAdd">
        <input type="submit" id="submitbtnAdd" value="Add item">
      </form>
      <div id="addedItemSection"></div>
    </div>
  </main>
  <footer>
    <section>
      <p><strong>&copy; Cats & Coffee Admin</strong></p>
      <a href="">Go to visitor webpage (opens in new tab)</a>
    </section>
    <div>
      <p>Our accounts: </p>
      <a href="#" aria-label="Facebook">
        <i class="fa-brands fa-facebook fa-2xl" aria-hidden="true"></i>
      </a>
      <a href="#" aria-label="instagram">
        <i class="fa-brands fa-instagram fa-2xl" aria-hidden="true"></i>
      </a>
    </div>
  </footer>
  <script type="module" src="/src/js/main.js"></script>
  <script type="module" src="/src/js/hamburger.js"></script>
  <script type="module" src="/src/js/checkAuth.js"></script>
  <script type="module" src="/src/js/addmenu.js"></script>
</body>

</html>
